<!-- templates/cars/car_list.html -->
{% extends 'base.html' %}
{% block title %}Discover Cars{% endblock %}

{% block content %}

<section class="page-header">
  <div>
    <h1 class="page-title">Discover Cars</h1>
    <p class="page-subtitle">Search available cars near you and book the perfect ride.</p>
  </div>
</section>

<section>
  <div class="page-header" style="margin-bottom:1rem">
    <div>
      <h2 class="page-title" style="font-size:1.25rem;">Available Cars</h2>
    </div>
    <div class="page-actions">
      <button class="btn btn-outline" onclick="resetFilters()">Reset filters</button>
    </div>
  </div>

  <div class="filters-bar">
    <input type="search" id="searchQuery" placeholder="Search brand, model or location" oninput="loadCars()" />
    <select id="filterType" onchange="loadCars()">
      <option value="">All Types</option>
      <option value="sedan">Sedan</option>
      <option value="suv">SUV</option>
      <option value="luxury">Luxury</option>
      <option value="hatchback">Hatchback</option>
      <option value="truck">Truck</option>
      <option value="van">Van</option>
    </select>
    <input type="number" id="minPrice" placeholder="Min price/day" onchange="loadCars()"/>
    <input type="number" id="maxPrice" placeholder="Max price/day" onchange="loadCars()"/>
    <button class="btn btn-outline" onclick="resetFilters()">Reset</button>
  </div>

  <div id="carsGrid" class="car-grid">
    <p><span class="spinner"></span> Loading cars...</p>
  </div>
</section>

{% endblock %}

{% block scripts %}
<script>
  async function loadCars(search = '') {
    search = search || document.getElementById('searchQuery')?.value?.trim() || '';
    const type     = document.getElementById('filterType').value;
    const minPrice = document.getElementById('minPrice').value;
    const maxPrice = document.getElementById('maxPrice').value;

    let url = '/api/cars/?';
    if (search)   url += `search=${search}&`;
    if (type)     url += `car_type=${type}&`;
    if (minPrice) url += `min_price=${minPrice}&`;
    if (maxPrice) url += `max_price=${maxPrice}&`;

    const grid = document.getElementById('carsGrid');
    grid.innerHTML = '<p><span class="spinner"></span> Loading...</p>';

    try {
      const data = await API.get(url);
      const cars = data.results || data;

      if (!cars.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <h3>No cars found</h3>
            <p>Try adjusting your filters.</p>
          </div>`;
        return;
      }

      grid.innerHTML = cars.map(car => `
        <div class="car-card" onclick="window.location='/cars/${car.id}/'">
          <img
            src="${car.primary_image || '/static/images/no-image.svg'}"
            alt="${car.brand} ${car.model}"
            onerror="this.onerror=null; this.src='/static/images/no-image.svg'"
          />
          <div class="car-card-body">
            <h3>${car.brand} ${car.model}</h3>
            <div class="car-meta">
              <span class="badge badge-blue">${car.car_type.toUpperCase()}</span>
              <span class="badge badge-gray">${car.year || ''}</span>
              <span class="badge badge-${car.is_available ? 'green' : 'red'}">
                ${car.is_available ? 'Available' : 'Unavailable'}
              </span>
            </div>
            <p style="font-size:.85rem;color:var(--text-muted)">📍 ${car.location || 'Location not set'}</p>
            <div class="car-price">PKR ${car.price_per_day}<span style="font-size:.85rem;font-weight:400;color:var(--text-muted)">/day</span></div>
            <button class="btn btn-primary" style="width:100%;margin-top:.5rem">View Details</button>
          </div>
        </div>
      `).join('');

    } catch (err) {
      grid.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
    }
  }

  function resetFilters() {
    document.getElementById('filterType').value = '';
    document.getElementById('minPrice').value   = '';
    document.getElementById('maxPrice').value   = '';
    loadCars();
  }

  loadCars();
</script>
{% endblock %}
