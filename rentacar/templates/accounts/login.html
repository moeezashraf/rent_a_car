<!-- templates/accounts/login.html -->
{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <h2>Welcome back</h2>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"/>
    </div>

    <div id="loginError" class="form-error" style="margin-bottom:.75rem;"></div>

    <button class="btn btn-primary" style="width:100%" onclick="doLogin()" id="loginBtn">
      Login
    </button>

    <p style="text-align:center;margin-top:1rem;font-size:.9rem;">
      Don't have an account? <a href="/register/">Register here</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    if (!username || !password) {
      errEl.textContent = 'Please fill in all fields.';
      return;
    }

    btn.disabled     = true;
    btn.innerHTML    = '<span class="spinner"></span> Logging in...';
    errEl.textContent = '';

    try {
      const data = await API.post('/api/accounts/login/', { username, password });
      API.saveSession(data.token, data.user);
      showFlash('Login successful! Redirecting...', 'success');

      // Redirect based on role
      setTimeout(() => {
        const role = data.user.role;
        if (role === 'customer') window.location.href = '/dashboard/customer/';
        else if (role === 'owner') window.location.href = '/dashboard/owner/';
        else if (role === 'admin') window.location.href = '/dashboard/admin/';
        else window.location.href = '/';
      }, 800);

    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled  = false;
      btn.innerHTML = 'Login';
    }
  }

  // Allow pressing Enter to login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
{% endblock %}
