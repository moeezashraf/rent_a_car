<!-- templates/accounts/register.html -->
{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <h2>Create your account</h2>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label>I want to</label>
      <select id="role">
        <option value="customer">Rent a car (Customer)</option>
        <option value="owner">List my car (Owner)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="password2" placeholder="Repeat your password"/>
    </div>

    <div id="regError" class="form-error" style="margin-bottom:.75rem;"></div>

    <button class="btn btn-primary" style="width:100%" onclick="doRegister()" id="regBtn">
      Create Account
    </button>

    <p class="auth-note">
      Already have an account? <a href="/login/">Login here</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function doRegister() {
    const username  = document.getElementById('username').value.trim();
    const email     = document.getElementById('email').value.trim();
    const role      = document.getElementById('role').value;
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const btn       = document.getElementById('regBtn');
    const errEl     = document.getElementById('regError');

    if (!username || !email || !password || !password2) {
      errEl.textContent = 'Please fill in all fields.';
      return;
    }

    if (password !== password2) {
      errEl.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled      = true;
    btn.innerHTML     = '<span class="spinner"></span> Creating account...';
    errEl.textContent = '';

    try {
      const data = await API.post('/api/accounts/register/', {
        username, email, role, password, password2
      });
      API.saveSession(data.token, data.user);
      showFlash('Account created! Redirecting...', 'success');

      setTimeout(() => {
        if (role === 'owner')    window.location.href = '/dashboard/owner/';
        else window.location.href = '/dashboard/customer/';
      }, 800);

    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled  = false;
      btn.innerHTML = 'Create Account';
    }
  }
</script>
{% endblock %}
