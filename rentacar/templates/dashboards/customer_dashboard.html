<!-- templates/dashboards/customer_dashboard.html -->
{% extends 'base.html' %}
{% block title %}My Dashboard{% endblock %}

{% block content %}

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
  <h1>My Dashboard</h1>
  <a href="/cars/" class="btn btn-primary">Browse Cars</a>
</div>

<!-- Stats -->
<div class="stats-row" id="statsRow">
  <div class="stat-card">
    <div class="stat-number" id="totalBookings">—</div>
    <div class="stat-label">Total Bookings</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="activeBookings">—</div>
    <div class="stat-label">Active Bookings</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="completedBookings">—</div>
    <div class="stat-label">Completed</div>
  </div>
</div>

<!-- Bookings table -->
<div class="card">
  <h2 style="margin-bottom:1rem">My Bookings</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Car</th>
          <th>Dates</th>
          <th>Cost</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookingsTable">
        <tr><td colspan="6"><span class="spinner"></span> Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  // Redirect if not logged in as customer
  if (!API.isLoggedIn()) window.location.href = '/login/';
  if (API.getRole() !== 'customer') window.location.href = '/';

  const STATUS_BADGE = {
    pending:   'badge-amber',
    approved:  'badge-green',
    rejected:  'badge-red',
    cancelled: 'badge-gray',
    completed: 'badge-blue',
  };

  async function loadDashboard() {
    try {
      const bookings = await API.get('/api/bookings/my-bookings/');

      // Stats
      document.getElementById('totalBookings').textContent     = bookings.length;
      document.getElementById('activeBookings').textContent    = bookings.filter(b => b.status === 'approved').length;
      document.getElementById('completedBookings').textContent = bookings.filter(b => b.status === 'completed').length;

      if (!bookings.length) {
        document.getElementById('bookingsTable').innerHTML = `
          <tr><td colspan="6" class="empty-state">
            <h3>No bookings yet</h3>
            <p><a href="/cars/">Browse cars to make your first booking</a></p>
          </td></tr>`;
        return;
      }

      document.getElementById('bookingsTable').innerHTML = bookings.map(b => `
        <tr>
          <td>#${b.id}</td>
          <td>
            <a href="/cars/${b.car.id}/">${b.car.brand} ${b.car.model}</a><br>
            <small style="color:var(--text-muted)">📍 ${b.car.location}</small>
          </td>
          <td>${b.start_date} → ${b.end_date}</td>
          <td><strong>$${b.total_cost}</strong></td>
          <td><span class="badge ${STATUS_BADGE[b.status] || 'badge-gray'}">${b.status}</span></td>
          <td>
            ${b.status === 'pending' || b.status === 'approved'
              ? `<button class="btn btn-danger" style="font-size:.8rem;padding:.3rem .7rem"
                   onclick="cancelBooking(${b.id})">Cancel</button>`
              : '—'
            }
            ${b.status === 'completed' ? `<button class="btn btn-outline" style="font-size:.8rem;padding:.3rem .7rem"
                onclick="leaveReview(${b.id})">Review</button>` : ''}
          </td>
        </tr>
      `).join('');

    } catch (err) {
      document.getElementById('bookingsTable').innerHTML =
        `<tr><td colspan="6" style="color:red">${err.message}</td></tr>`;
    }
  }

  async function cancelBooking(id) {
    if (!confirm('Are you sure you want to cancel this booking?')) return;
    try {
      await API.patch(`/api/bookings/${id}/cancel/`, {});
      showFlash('Booking cancelled.', 'success');
      loadDashboard();
    } catch (err) {
      showFlash(err.message, 'error');
    }
  }

  function leaveReview(bookingId) {
    const rating  = prompt('Rate your experience (1-5 stars):');
    const comment = prompt('Leave a comment (optional):');
    if (!rating) return;

    API.post('/api/bookings/review/', {
      booking: bookingId,
      rating:  parseInt(rating),
      comment: comment || ''
    }).then(() => {
      showFlash('Review submitted. Thank you!', 'success');
    }).catch(err => showFlash(err.message, 'error'));
  }

  loadDashboard();
</script>
{% endblock %}
